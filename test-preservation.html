<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preservation Property Tests</title>
  <style>
    body {
      font-family: monospace;
      padding: 20px;
      background: #1e1e1e;
      color: #d4d4d4;
    }
    .test-result {
      margin: 10px 0;
      padding: 10px;
      border-radius: 4px;
    }
    .pass {
      background: #1e3a1e;
      border-left: 4px solid #4caf50;
    }
    .fail {
      background: #3a1e1e;
      border-left: 4px solid #f44336;
    }
    .info {
      background: #1e2a3a;
      border-left: 4px solid #2196f3;
    }
    h1 {
      color: #4fc3f7;
    }
    h2 {
      color: #81c784;
      margin-top: 30px;
    }
    pre {
      background: #2d2d2d;
      padding: 10px;
      border-radius: 4px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>Preservation Property Tests</h1>
  <p><strong>Property 2: Preservation - State Mutation Exclusivity and Display Rendering</strong></p>
  <p>Validates: Requirements 3.1, 3.2, 3.3, 3.4</p>
  <p><strong>IMPORTANT:</strong> These tests observe behavior on UNFIXED code and should PASS</p>
  
  <div id="test-output"></div>

  <div style="display:none;">
    <canvas id="circuitCanvas"></canvas>
    <div id="overloadBanner"></div>
    <span id="displayVoltage"></span>
    <span id="displayResistance"></span>
    <span id="displayCurrent"></span>
    <span id="displayPower"></span>
    <span id="displayStatus"></span>
    <span id="labelCurrent"></span>
    <span id="displayCurrentPerBulb"></span>
    <div id="itemCurrentPerBulb"></div>
    <span id="displayBatteryLife"></span>
    <span id="displayCurrentPeak"></span>
    <div id="itemCurrentPeak"></div>
    <input type="range" id="batteryCount" value="1" />
    <span id="batteryCountDisplay"></span>
    <input type="range" id="bulbCount" value="1" />
    <span id="bulbCountDisplay"></span>
    <input type="radio" name="circuitType" value="seri" id="typeSeri" checked />
    <input type="radio" name="circuitType" value="paralel" />
    <input type="radio" name="bulbWatt" value="5" />
    <input type="radio" name="bulbWatt" value="10" id="watt10" checked />
    <input type="radio" name="bulbWatt" value="25" />
    <button id="btnReset"></button>
  </div>

  <script src="js/sirkuit.js"></script>
  <script>
    const testOutput = document.getElementById('test-output');

    function logResult(message, type = 'info') {
      const div = document.createElement('div');
      div.className = `test-result ${type}`;
      div.textContent = message;
      testOutput.appendChild(div);
    }

    function logCounterexample(example) {
      const div = document.createElement('div');
      div.className = 'test-result fail';
      div.innerHTML = '<strong>COUNTEREXAMPLE:</strong><pre>' + JSON.stringify(example, null, 2) + '</pre>';
      testOutput.appendChild(div);
    }

    function generateOverloadState() {
      const circuitTypes = ['seri', 'paralel'];
      const bulbWatts = [5, 10, 25];
      
      return {
        circuitType: circuitTypes[Math.floor(Math.random() * circuitTypes.length)],
        batteryCount: Math.floor(Math.random() * 3) + 2,
        bulbCount: 1,
        bulbWatt: bulbWatts[Math.floor(Math.random() * bulbWatts.length)],
        I_peak: Math.random() * 2 + 0.5
      };
    }

    function generateNormalState() {
      const circuitTypes = ['seri', 'paralel'];
      const bulbWatts = [5, 10, 25];
      const bulbStates = ['normal', 'dim'];
      
      return {
        circuitType: circuitTypes[Math.floor(Math.random() * circuitTypes.length)],
        batteryCount: Math.floor(Math.random() * 2) + 1,
        bulbCount: Math.floor(Math.random() * 3) + 1,
        bulbWatt: bulbWatts[Math.floor(Math.random() * bulbWatts.length)],
        bulbState: bulbStates[Math.floor(Math.random() * bulbStates.length)]
      };
    }

    function testOverloadDisplayPreservation() {
      logResult('=== TEST 1: Overload Display Preservation ===', 'info');
      logResult('Verify "Arus Sebelum Putus" displays correctly when sim.bulbState === "overload" and sim.I_peak > 0', 'info');
      logResult('', 'info');

      const { sim, updateDisplay, elItemCurrentPeak, elCurrentPeak } = window.__TEST_EXPORTS__;

      const numTests = 50;
      let failureCount = 0;
      const counterexamples = [];

      for (let i = 0; i < numTests; i++) {
        const testState = generateOverloadState();
        
        sim.circuitType = testState.circuitType;
        sim.batteryCount = testState.batteryCount;
        sim.bulbCount = testState.bulbCount;
        sim.bulbWatt = testState.bulbWatt;
        sim.bulbState = 'overload';
        sim.I_peak = testState.I_peak;
        sim.I = 0;
        sim.V_total = testState.batteryCount * 1.5;
        sim.R_total = 2.25 / testState.bulbWatt;
        sim.P_actual = testState.bulbWatt * 1.5;

        try {
          updateDisplay();
        } catch (e) {
          failureCount++;
          counterexamples.push({
            testNumber: i + 1,
            error: e.message,
            state: testState
          });
          continue;
        }

        const isHidden = elItemCurrentPeak.hidden;
        const displayText = elCurrentPeak.textContent;
        const expectedText = `${testState.I_peak.toFixed(3)} A (rangkaian terbuka)`;

        if (isHidden || displayText !== expectedText) {
          failureCount++;
          if (counterexamples.length < 3) {
            counterexamples.push({
              testNumber: i + 1,
              I_peak: testState.I_peak,
              isHidden: isHidden,
              displayText: displayText,
              expectedText: expectedText,
              issue: isHidden ? 'Display item is hidden when it should be visible' : 'Display text mismatch'
            });
          }
        }
      }

      if (failureCount === 0) {
        logResult(`PASS: All ${numTests} test cases passed`, 'pass');
        logResult('Overload display rendering works correctly on unfixed code', 'pass');
      } else {
        logResult(`FAIL: ${failureCount}/${numTests} cases failed`, 'fail');
        counterexamples.forEach(ex => logCounterexample(ex));
      }

      logResult('', 'info');
      return failureCount === 0;
    }

    function testNormalDisplayPreservation() {
      logResult('=== TEST 2: Normal Display Preservation ===', 'info');
      logResult('Verify voltage, resistance, power, current display correctly in all states', 'info');
      logResult('', 'info');

      const { sim, updateDisplay, elVoltage, elResistance, elPower, elCurrent } = window.__TEST_EXPORTS__;

      const numTests = 50;
      let failureCount = 0;
      const counterexamples = [];

      for (let i = 0; i < numTests; i++) {
        const testState = generateNormalState();
        
        sim.circuitType = testState.circuitType;
        sim.batteryCount = testState.batteryCount;
        sim.bulbCount = testState.bulbCount;
        sim.bulbWatt = testState.bulbWatt;
        sim.bulbState = testState.bulbState;
        
        const R_bulb = 2.25 / testState.bulbWatt;
        if (testState.circuitType === 'seri') {
          sim.V_total = testState.batteryCount * 1.5;
          sim.R_total = testState.bulbCount * R_bulb;
        } else {
          sim.V_total = 1.5;
          sim.R_total = R_bulb / testState.bulbCount;
        }
        
        sim.I = sim.R_total > 0 ? sim.V_total / sim.R_total : 0;
        sim.P_actual = testState.bulbWatt * 0.8;
        sim.I_peak = 0;

        try {
          updateDisplay();
        } catch (e) {
          failureCount++;
          counterexamples.push({
            testNumber: i + 1,
            error: e.message,
            state: testState
          });
          continue;
        }

        const voltageText = elVoltage.textContent;
        const resistanceText = elResistance.textContent;
        const powerText = elPower.textContent;
        const currentText = elCurrent.textContent;

        const expectedVoltage = `${sim.V_total.toFixed(2)} V`;
        const expectedResistance = `${sim.R_total.toFixed(2)} Ω`;
        const expectedPower = `${sim.P_actual.toFixed(2)} W`;
        const expectedCurrent = `${sim.I.toFixed(3)} A`;

        if (voltageText !== expectedVoltage || resistanceText !== expectedResistance || 
            powerText !== expectedPower || currentText !== expectedCurrent) {
          failureCount++;
          if (counterexamples.length < 3) {
            counterexamples.push({
              testNumber: i + 1,
              voltageText: voltageText,
              expectedVoltage: expectedVoltage,
              resistanceText: resistanceText,
              expectedResistance: expectedResistance,
              powerText: powerText,
              expectedPower: expectedPower,
              currentText: currentText,
              expectedCurrent: expectedCurrent
            });
          }
        }
      }

      if (failureCount === 0) {
        logResult(`PASS: All ${numTests} test cases passed`, 'pass');
        logResult('Normal display rendering works correctly on unfixed code', 'pass');
      } else {
        logResult(`FAIL: ${failureCount}/${numTests} cases failed`, 'fail');
        counterexamples.forEach(ex => logCounterexample(ex));
      }

      logResult('', 'info');
      return failureCount === 0;
    }

    function testParallelCurrentDisplayPreservation() {
      logResult('=== TEST 3: Parallel Current Display Preservation ===', 'info');
      logResult('Verify "Arus per Lampu" displays correctly in parallel mode', 'info');
      logResult('', 'info');

      const { sim, updateDisplay, elItemCurrentPerBulb, elCurrentPerBulb, elLabelCurrent } = window.__TEST_EXPORTS__;

      const numTests = 30;
      let failureCount = 0;
      const counterexamples = [];

      for (let i = 0; i < numTests; i++) {
        const bulbCount = Math.floor(Math.random() * 3) + 2;
        const bulbWatt = [5, 10, 25][Math.floor(Math.random() * 3)];
        
        sim.circuitType = 'paralel';
        sim.batteryCount = 1;
        sim.bulbCount = bulbCount;
        sim.bulbWatt = bulbWatt;
        sim.bulbState = 'normal';
        
        const R_bulb = 2.25 / bulbWatt;
        sim.V_total = 1.5;
        sim.R_total = R_bulb / bulbCount;
        sim.I = sim.V_total / sim.R_total;
        sim.P_actual = bulbWatt * 0.9;
        sim.I_peak = 0;

        try {
          updateDisplay();
        } catch (e) {
          failureCount++;
          counterexamples.push({
            testNumber: i + 1,
            error: e.message,
            bulbCount: bulbCount
          });
          continue;
        }

        const isHidden = elItemCurrentPerBulb.hidden;
        const displayText = elCurrentPerBulb.textContent;
        const labelText = elLabelCurrent.textContent;
        const expectedPerBulb = sim.I / bulbCount;
        const expectedText = `${expectedPerBulb.toFixed(3)} A`;

        if (isHidden || displayText !== expectedText || labelText !== 'Arus Total (I)') {
          failureCount++;
          if (counterexamples.length < 3) {
            counterexamples.push({
              testNumber: i + 1,
              bulbCount: bulbCount,
              isHidden: isHidden,
              displayText: displayText,
              expectedText: expectedText,
              labelText: labelText,
              expectedLabel: 'Arus Total (I)'
            });
          }
        }
      }

      if (failureCount === 0) {
        logResult(`PASS: All ${numTests} test cases passed`, 'pass');
        logResult('Parallel current display works correctly on unfixed code', 'pass');
      } else {
        logResult(`FAIL: ${failureCount}/${numTests} cases failed`, 'fail');
        counterexamples.forEach(ex => logCounterexample(ex));
      }

      logResult('', 'info');
      return failureCount === 0;
    }

    function testStatusDisplayPreservation() {
      logResult('=== TEST 4: Status Display Preservation ===', 'info');
      logResult('Verify status text and styling update correctly', 'info');
      logResult('', 'info');

      const { sim, updateDisplay, elStatus } = window.__TEST_EXPORTS__;

      const testCases = [
        { bulbState: 'dim', expectedText: 'Redup', expectedClass: 'status-dim' },
        { bulbState: 'normal', expectedText: 'Normal', expectedClass: 'status-normal' },
        { bulbState: 'overload', expectedText: 'OVERLOAD!', expectedClass: 'status-overload' }
      ];

      let failureCount = 0;
      const counterexamples = [];

      testCases.forEach((testCase, i) => {
        sim.bulbState = testCase.bulbState;
        sim.circuitType = 'seri';
        sim.batteryCount = 1;
        sim.bulbCount = 1;
        sim.bulbWatt = 10;
        sim.V_total = 1.5;
        sim.R_total = 0.225;
        sim.I = testCase.bulbState === 'overload' ? 0 : 6.67;
        sim.P_actual = 10;
        sim.I_peak = testCase.bulbState === 'overload' ? 1.5 : 0;

        try {
          updateDisplay();
        } catch (e) {
          failureCount++;
          counterexamples.push({
            testNumber: i + 1,
            error: e.message,
            bulbState: testCase.bulbState
          });
          return;
        }

        const statusText = elStatus.textContent;
        const hasExpectedClass = elStatus.classList.contains(testCase.expectedClass);

        if (statusText !== testCase.expectedText || !hasExpectedClass) {
          failureCount++;
          counterexamples.push({
            testNumber: i + 1,
            bulbState: testCase.bulbState,
            statusText: statusText,
            expectedText: testCase.expectedText,
            hasExpectedClass: hasExpectedClass,
            classList: Array.from(elStatus.classList)
          });
        }
      });

      if (failureCount === 0) {
        logResult(`PASS: All ${testCases.length} test cases passed`, 'pass');
        logResult('Status display works correctly on unfixed code', 'pass');
      } else {
        logResult(`FAIL: ${failureCount}/${testCases.length} cases failed`, 'fail');
        counterexamples.forEach(ex => logCounterexample(ex));
      }

      logResult('', 'info');
      return failureCount === 0;
    }

    function testRunPhysicsStateReset() {
      logResult('=== TEST 5: runPhysics() State Reset on Overload Transition ===', 'info');
      logResult('Verify runPhysics() at line 245 resets sim.I_peak = 0 on overload-to-normal transition', 'info');
      logResult('', 'info');

      const { sim, runPhysics } = window.__TEST_EXPORTS__;

      const numTests = 30;
      let failureCount = 0;
      const counterexamples = [];

      for (let i = 0; i < numTests; i++) {
        sim.circuitType = 'seri';
        sim.batteryCount = 1;
        sim.bulbCount = 1;
        sim.bulbWatt = 10;
        sim.wasOverload = true;
        sim.I_peak = Math.random() * 2 + 0.5;

        const I_peak_before = sim.I_peak;

        try {
          runPhysics();
        } catch (e) {
          failureCount++;
          counterexamples.push({
            testNumber: i + 1,
            error: e.message
          });
          continue;
        }

        const I_peak_after = sim.I_peak;
        const bulbState = sim.bulbState;

        if (bulbState !== 'overload' && I_peak_after !== 0) {
          failureCount++;
          if (counterexamples.length < 3) {
            counterexamples.push({
              testNumber: i + 1,
              I_peak_before: I_peak_before,
              I_peak_after: I_peak_after,
              bulbState: bulbState,
              issue: 'runPhysics() did not reset sim.I_peak to 0 on overload-to-normal transition'
            });
          }
        }
      }

      if (failureCount === 0) {
        logResult(`PASS: All ${numTests} test cases passed`, 'pass');
        logResult('runPhysics() correctly resets sim.I_peak on overload-to-normal transition', 'pass');
      } else {
        logResult(`FAIL: ${failureCount}/${numTests} cases failed`, 'fail');
        counterexamples.forEach(ex => logCounterexample(ex));
      }

      logResult('', 'info');
      return failureCount === 0;
    }

    function runAllTests() {
      logResult('Starting Preservation Property Tests on UNFIXED code', 'info');
      logResult('EXPECTED OUTCOME: All tests should PASS (confirms baseline behavior to preserve)', 'info');
      logResult('', 'info');

      const results = [];
      
      results.push(testOverloadDisplayPreservation());
      results.push(testNormalDisplayPreservation());
      results.push(testParallelCurrentDisplayPreservation());
      results.push(testStatusDisplayPreservation());
      results.push(testRunPhysicsStateReset());

      const allPassed = results.every(r => r === true);

      logResult('=== FINAL SUMMARY ===', 'info');
      if (allPassed) {
        logResult('ALL PRESERVATION TESTS PASSED', 'pass');
        logResult('Baseline behavior confirmed on unfixed code', 'pass');
        logResult('These behaviors must be preserved after implementing the fix', 'info');
      } else {
        logResult('SOME PRESERVATION TESTS FAILED', 'fail');
        logResult('This may indicate issues with the test setup or unexpected behavior', 'fail');
      }
    }

    window.addEventListener('load', () => {
      setTimeout(() => {
        try {
          if (!window.__TEST_EXPORTS__) {
            logResult('ERROR: Test exports not found. Make sure sirkuit.js is loaded.', 'fail');
            return;
          }
          runAllTests();
        } catch (e) {
          logResult('ERROR: ' + e.message, 'fail');
          logResult('Stack: ' + e.stack, 'fail');
        }
      }, 500);
    });
  </script>
</body>
</html>
